function parseCSV(csvText) {
  return parseCSVRows(csvText).slice(1);
}

function parseCSVRows(csvText) {
  const rows = [];
  let currentField = "";
  let inQuotes = false;
  let currentRow = [];
  for (let i = 0; i < csvText.length; i++) {
    const char = csvText[i];
    const nextChar = csvText[i + 1];
    if (inQuotes) {
      if (char === '"' && nextChar === '"') { currentField += '"'; i++; }
      else if (char === '"') { inQuotes = false; }
      else { currentField += char; }
    } else {
      if (char === '"') { inQuotes = true; }
      else if (char === ',') { currentRow.push(currentField.trim()); currentField = ""; }
      else if (char === '\r' || char === '\n') {
        currentRow.push(currentField.trim());
        if (currentRow.some(field => field.trim() !== "")) rows.push(currentRow);
        currentRow = []; currentField = "";
        if (char === '\r' && nextChar === '\n') i++;
      } else { currentField += char; }
    }
  }
  if (currentField !== "" || currentRow.length > 0) {
    currentRow.push(currentField.trim());
    if (currentRow.some(field => field.trim() !== "")) rows.push(currentRow);
  }
  return rows;
}

function setupNewsBanner(csvText) {
  const newsContainer = document.getElementById('news-container');
  const newsBanner = document.querySelector('.news-banner');
  const rows = parseCSVRows(csvText).filter(row => row.some(col => col.trim() !== ""));
  const headerText = (rows[0] && rows[0][0] ? rows[0][0] : "").toLowerCase();
  const hasHeader = /news|title|お知らせ|タイトル|見出し|本文/.test(headerText);
  const newsRows = hasHeader ? rows.slice(1) : rows;

  newsContainer.innerHTML = "";
  if (newsRows.length === 0) {
    newsBanner.style.display = 'none';
    return;
  }

  const newsItems = newsRows.map(cols => {
    const text = (cols[0] || "").trim();
    const link = (cols[1] || "").trim();
    return { text, link };
  }).filter(item => item.text);

  const createNewsItem = ({ text, link }) => {
    const item = document.createElement(link.startsWith('http') ? 'a' : 'span');
    item.className = "news-item";
    item.textContent = `${text} 🐾`;
    if (item.tagName === 'A') {
      item.href = link;
      item.target = "_blank";
      item.rel = "noopener noreferrer";
    }
    return item;
  };

  const renderNewsItems = (copies) => {
    newsContainer.innerHTML = "";
    const fragment = document.createDocumentFragment();
    for (let i = 0; i < copies; i++) {
      newsItems.forEach(item => fragment.appendChild(createNewsItem(item)));
    }
    newsContainer.appendChild(fragment);
  };

  if (newsItems.length === 0) {
    newsBanner.style.display = 'none';
    return;
  }

  const updateNewsAnimation = () => {
    const bannerWidth = newsBanner.offsetWidth;
    renderNewsItems(1);
    const singleSetWidth = newsContainer.scrollWidth;
    if (!singleSetWidth) return;
    const copies = Math.max(2, Math.ceil((bannerWidth + singleSetWidth) / singleSetWidth) + 1);
    renderNewsItems(copies);
    const duration = Math.max(18, singleSetWidth / 55);
    newsContainer.style.setProperty('--news-end', `-${singleSetWidth}px`);
    newsContainer.style.setProperty('--news-duration', `${duration}s`);
  };

  updateNewsAnimation();
  window.addEventListener('resize', updateNewsAnimation);
}

async function loadData() {
  try {
    const [resJp, resEn, resNews] = await Promise.all([
      fetch(urlJp).then(r => r.text()), 
      fetch(urlEn).then(r => r.text()),
      fetch(urlNews).then(r => r.text())
    ]);

    dataJp = parseCSV(resJp); 
    dataEn = parseCSV(resEn);

 // ニュース反映処理
    try {
      setupNewsBanner(resNews);
    } catch (e) { console.warn(e); }

    document.getElementById('status').style.display = 'none';
    document.getElementById('pokeTable').style.display = 'table';
    switchLang();
  } catch (e) { 
    document.getElementById('status').innerText = 'エラー🐾'; 
  }
}

function initFilterButtons(lang) {
  const container = document.getElementById('filterButtons');
  container.innerHTML = "";
  categories[lang].forEach(cat => {
    const mainTitle = document.createElement('div');
    mainTitle.className = "main-category-title";
    mainTitle.innerText = cat.main;
    container.appendChild(mainTitle);
    cat.subs.forEach(sub => {
      const section = document.createElement('div');
      if (sub.label !== "") { section.innerHTML = `<div class="sub-category-title" style="border-color:${sub.color}">${sub.label}</div>`; }
      const btnBox = document.createElement('div');
      btnBox.className = "btn-grid";
      sub.items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = "tag-btn";
        if (selectedTags.has(item)) btn.classList.add('active');
        btn.innerText = item;
        btn.onclick = () => toggleTag(item, btn);
        btnBox.appendChild(btn);
      });
      section.appendChild(btnBox);
      container.appendChild(section);
    });
  });
}

function toggleTag(tag, btn) {
  if (selectedTags.has(tag)) {
    selectedTags.delete(tag);
    btn.classList.remove('active');
  } else {
    selectedTags.add(tag);
    btn.classList.add('active');
  }
  updateActiveFilterDisplay();
  resetAndFilter(); 
}

function updateActiveFilterDisplay() {
  const container = document.getElementById('activeFilters');
  container.innerHTML = "";
  selectedTags.forEach(tag => {
    const span = document.createElement('div');
    span.className = "filter-tag";
    span.innerHTML = `${tag} <span style="margin-left:5px;">&times;</span>`;
    span.onclick = () => {
      selectedTags.delete(tag);
      document.querySelectorAll('.tag-btn').forEach(b => { if(b.innerText === tag) b.classList.remove('active'); });
      updateActiveFilterDisplay();
      resetAndFilter();
    };
    container.appendChild(span);
  });
}

function clearFilters() {
  selectedTags.clear();
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pokeInput').value = "";
  updateClearSearchButton();
  updateActiveFilterDisplay();
  resetAndFilter();
}

function updateClearSearchButton() {
  const inputEl = document.getElementById('pokeInput');
  const clearBtn = document.getElementById('clearSearchBtn');
  if (!inputEl || !clearBtn) return;
  clearBtn.classList.toggle('show', inputEl.value.length > 0);
}

function handleSearchInput() {
  updateClearSearchButton();
  resetAndFilter();
  reportToGTM(document.getElementById('pokeInput').value);
}

function clearSearchInput() {
  const inputEl = document.getElementById('pokeInput');
  if (!inputEl) return;
  inputEl.value = "";
  updateClearSearchButton();
  resetAndFilter();
  inputEl.focus();
}

function toggleDrawer() {
  const d = document.getElementById('drawer');
  const o = document.getElementById('overlay');
  d.classList.toggle('open');
  o.style.display = d.classList.contains('open') ? "block" : "none";
}

function switchLang() {
  const lang = document.querySelector('input[name="lang"]:checked').value;
  const currentConfig = config[lang];
  document.documentElement.lang = (lang === 'jp') ? 'ja' : 'en';
  document.title = currentConfig.pageTitle;
  document.getElementById('pageTitle').innerText = currentConfig.pageTitle;
  document.getElementById('pageDescription').innerText = currentConfig.pageDescription;
  document.getElementById('guideLink').innerText = currentConfig.guideLink;
  document.getElementById('articleLink').innerText = currentConfig.articleLink;
  document.getElementById('portalLinkText').innerText = currentConfig.portalLink;
  document.getElementById('footerNotice').innerText = currentConfig.footerNotice;
  document.getElementById('footerCredit').innerText = currentConfig.footerCredit;
  document.getElementById('menuTitle').innerText = currentConfig.menuTitle;
  document.getElementById('resetBtn').innerText = currentConfig.reset;
  document.getElementById('loadMoreBtn').innerText = currentConfig.loadMore;
  document.getElementById('pokeHead').innerHTML = `<tr>${currentConfig.headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
  document.getElementById('pokeInput').placeholder = currentConfig.placeholder;
  updateClearSearchButton();
  initFilterButtons(lang);
  resetAndFilter(); 
}

function resetAndFilter() {
  const lang = document.querySelector('input[name="lang"]:checked').value;
  const sourceData = (lang === 'jp') ? dataJp : dataEn;
  const inputEl = document.getElementById("pokeInput");
  const input = inputEl ? inputEl.value.toLowerCase() : "";
  const textKeywords = input.replace(/、|,/g, " ").split(/[\s　]+/).filter(k => k !== "");
  const allKeywords = [...new Set([...textKeywords, ...selectedTags])];
  const mode = document.querySelector('input[name="mode"]:checked').value;

  if (allKeywords.length === 0) {
    currentFilteredData = sourceData;
  } else {
    currentFilteredData = sourceData.filter(cols => {
      const rowText = cols.join(" ").toLowerCase();
      return (mode === "and") 
        ? allKeywords.every(k => rowText.includes(k.toLowerCase())) 
        : allKeywords.some(k => rowText.includes(k.toLowerCase()));
    });
  }

  displayedCount = 0;
  document.getElementById('pokeBody').innerHTML = '';
  if (currentFilteredData.length === 0) {
    document.getElementById('status').innerText = (lang === 'jp' ? '該当なし🐾' : 'No results🐾');
    document.getElementById('status').style.display = 'block';
    document.getElementById('loadMoreBtn').style.display = 'none';
  } else {
    document.getElementById('status').style.display = 'none';
    displayNextBatch();
  }
}

function displayNextBatch() {
  const lang = document.querySelector('input[name="lang"]:checked').value;
  const currentConfig = config[lang];
  const tbody = document.getElementById('pokeBody');
  const nextBatch = currentFilteredData.slice(displayedCount, displayedCount + batchSize);
  nextBatch.forEach(cols => {
    const tr = document.createElement('tr');
    tr.innerHTML = cols.map((val, idx) => `
      <td data-label="${currentConfig.headers[idx] || ""}">${idx === 1 ? `<b>${val}</b>` : val}</td>
    `).join('');
    tbody.appendChild(tr);
  });
  displayedCount += nextBatch.length;
  document.getElementById('loadMoreBtn').style.display = (displayedCount < currentFilteredData.length) ? 'inline-block' : 'none';
}

window.onload = loadData;

let searchTimer;
function reportToGTM(val, isImmediate = false) {
  clearTimeout(searchTimer);
  if (!val) return;
  const sendData = () => {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ 'event': 'search_performed', 'search_term': val });
  };
  if (isImmediate) sendData(); else searchTimer = setTimeout(sendData, 1500);
}
